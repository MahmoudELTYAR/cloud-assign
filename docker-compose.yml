services:
  app:
    build: .
    container_name: app
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/testdb
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo
    container_name: mongo
    environment:
      - MONGO_INITDB_DATABASE=testdb
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: web
    depends_on:
      - app
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  mongo_data: